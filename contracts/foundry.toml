[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
via_ir = true
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read-write", path = "./broadcast" }]

[rpc_endpoints]
ritual = "https://rpc.ritualfoundation.org"
ritual_testnet = "https://rpc-testnet.ritualfoundation.org"
local = "http://localhost:8545"
